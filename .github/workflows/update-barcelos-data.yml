name: Atualizar dados Barcelos

on:
  workflow_dispatch:
  schedule:
    # A cada 6 horas, em UTC. No Brasil fica aproximadamente 00h, 06h, 12h e 18h.
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-barcelos-data:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Diagnosticar API ANA
        env:
          ANA_API_BASE_URL: "https://www.ana.gov.br/hidrowebservice/EstacoesTelemetricas"
          ANA_IDENTIFICADOR: ${{ secrets.ANA_IDENTIFICADOR }}
          ANA_SENHA: ${{ secrets.ANA_SENHA }}
        run: |
          python - <<'PY'
          import os
          import time
          import requests
          from datetime import date, timedelta

          base_url = os.environ['ANA_API_BASE_URL'].rstrip('/')
          identificador = os.getenv('ANA_IDENTIFICADOR')
          senha = os.getenv('ANA_SENHA')
          today = date.today()
          yesterday = today - timedelta(days=1)

          print('ANA_IDENTIFICADOR configurado:', bool(identificador))
          print('ANA_SENHA configurado:', bool(senha))
          print('Base URL:', base_url)
          print('Data BRT hoje:', today.isoformat())

          if not identificador or not senha:
              raise SystemExit('Secrets ANA_IDENTIFICADOR e/ou ANA_SENHA não configurados.')

          def get_with_retry(label, url, **kwargs):
              last_error = None
              for attempt in range(1, 4):
                  try:
                      return requests.get(url, timeout=90, **kwargs)
                  except requests.exceptions.RequestException as exc:
                      last_error = exc
                      print(f'{label} erro de rede tentativa {attempt}/3: {exc}')
                      if attempt < 3:
                          time.sleep(10 * attempt)
              raise last_error

          auth_url = f'{base_url}/OAUth/v1'
          auth = get_with_retry('Auth', auth_url, headers={'Identificador': identificador, 'Senha': senha})
          print('Auth HTTP status:', auth.status_code)
          auth.raise_for_status()

          auth_json = auth.json()
          token = (auth_json.get('items') or {}).get('tokenautenticacao') or (auth_json.get('items') or {}).get('token')
          print('Token recebido:', bool(token))
          if not token:
              raise SystemExit('Autenticação respondeu sem token/tokenautenticacao.')

          routes = [
              'HidroinfoanaSerieTelemetricaAdotada/v1',
              'HidroinfoanaSerieTelemetricaDetalhada/v1',
          ]

          date_values = [
              today.isoformat(),
              yesterday.isoformat(),
              today.strftime('%d/%m/%Y'),
              yesterday.strftime('%d/%m/%Y'),
              today.strftime('%d/%m/%Y 00:00:00'),
              yesterday.strftime('%d/%m/%Y 00:00:00'),
              today.strftime('%Y-%m-%d 00:00:00'),
              yesterday.strftime('%Y-%m-%d 00:00:00'),
          ]

          param_builders = {
              'manual_CodigoDaEstacao': lambda dt: {
                  'CodigoDaEstacao': '14480002',
                  'TipoFiltroData': 'DATA_LEITURA',
                  'DataDeBusca': dt,
                  'RangeIntervaloDeBusca': 'DIAS_30',
              },
              'sem_Da_De': lambda dt: {
                  'CodigoEstacao': '14480002',
                  'TipoFiltroData': 'DATA_LEITURA',
                  'DataBusca': dt,
                  'RangeIntervaloBusca': 'DIAS_30',
              },
              'camelCase': lambda dt: {
                  'codigoEstacao': '14480002',
                  'tipoFiltroData': 'DATA_LEITURA',
                  'dataDeBusca': dt,
                  'rangeIntervaloDeBusca': 'DIAS_30',
              },
          }

          header_builders = {
              'Authorization_Bearer': lambda: {'Authorization': f'Bearer {token}'},
              'Authorization_raw': lambda: {'Authorization': token},
              'tokenautenticacao': lambda: {'tokenautenticacao': token},
              'token': lambda: {'token': token},
          }

          attempts = []
          for route in routes:
              for data_busca in date_values:
                  for param_name, build_params in param_builders.items():
                      for header_name, build_headers in header_builders.items():
                          url = f'{base_url}/{route}'
                          params = build_params(data_busca)
                          response = get_with_retry('Data', url, params=params, headers=build_headers())
                          prefix = response.text[:220].replace('\n', ' ')
                          print(f'TESTE route={route} params={param_name} header={header_name} data={data_busca} status={response.status_code} prefix={prefix}')
                          item_count = 0
                          if response.status_code == 200:
                              try:
                                  payload = response.json()
                                  items = payload if isinstance(payload, list) else payload.get('items') or []
                                  item_count = len(items)
                                  if items:
                                      winner = {
                                          'route': route,
                                          'params': param_name,
                                          'header': header_name,
                                          'date': data_busca,
                                          'items': item_count,
                                          'fields': sorted(items[0].keys()),
                                      }
                                      print('CHAMADA_FUNCIONOU:', winner)
                                      raise SystemExit(0)
                              except SystemExit:
                                  raise
                              except Exception as exc:
                                  print('Erro lendo JSON 200:', exc)
                          attempts.append((route, param_name, header_name, data_busca, response.status_code, item_count))

          print('Nenhuma combinação funcionou. Resumo:')
          for item in attempts:
              print(item)
          raise SystemExit('Nenhuma combinação testada retornou HTTP 200 com items.')
          PY

      - name: Coletar dados da estação BARCELOS
        env:
          ANA_API_BASE_URL: "https://www.ana.gov.br/hidrowebservice/EstacoesTelemetricas"
          ANA_API_TOKEN: ${{ secrets.ANA_API_TOKEN }}
          ANA_IDENTIFICADOR: ${{ secrets.ANA_IDENTIFICADOR }}
          ANA_SENHA: ${{ secrets.ANA_SENHA }}
          ANA_STATION_ID: "14480002"
          ANA_STATION_LABEL: "5 - 14480002 - BARCELOS"
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Coleta tentativa ${attempt}/5"
            if python scripts/update_barcelos_data.py; then
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              sleep $((20 * attempt))
            fi
          done
          exit 1

      - name: Validar atualização recente
        run: |
          python - <<'PY'
          import json
          from datetime import date, datetime, timedelta

          with open('data/barcelos-atual.json', encoding='utf-8') as f:
              payload = json.load(f)

          latest = payload.get('latest') or {}
          latest_date_text = latest.get('date')
          status = payload.get('status')
          generated_at = payload.get('generated_at')

          print(f"Status do JSON: {status}")
          print(f"Gerado em: {generated_at}")
          print(f"Última data da base: {latest_date_text}")

          if not latest_date_text:
              raise SystemExit('barcelos-atual.json não possui latest.date')

          latest_date = datetime.strptime(latest_date_text, '%Y-%m-%d').date()
          min_expected = date.today() - timedelta(days=7)

          if latest_date < min_expected:
              raise SystemExit(
                  f'Dados desatualizados: última data {latest_date} é anterior ao mínimo esperado {min_expected}. '
                  'Verifique credenciais, permissões ou parâmetros da API ANA.'
              )

          print('Validação OK: dados recentes encontrados.')
          PY

      - name: Commit dos dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza dados automáticos de Barcelos"
          file_pattern: data/barcelos-nivel.json data/barcelos-atual.json data/barcelos-diario.json data/barcelos-semanal.json
