name: Atualizar dados Barcelos

on:
  workflow_dispatch:
  schedule:
    # A cada 6 horas, em UTC. No Brasil fica aproximadamente 00h, 06h, 12h e 18h.
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-barcelos-data:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Diagnosticar API ANA
        env:
          ANA_API_BASE_URL: "https://www.ana.gov.br/hidrowebservice/EstacoesTelemetricas"
          ANA_IDENTIFICADOR: ${{ secrets.ANA_IDENTIFICADOR }}
          ANA_SENHA: ${{ secrets.ANA_SENHA }}
          ANA_STATION_ID: "14480002"
        run: |
          python - <<'PY'
          import os
          import requests
          from datetime import date

          base_url = os.environ['ANA_API_BASE_URL'].rstrip('/')
          station_id = os.environ['ANA_STATION_ID']
          identificador = os.getenv('ANA_IDENTIFICADOR')
          senha = os.getenv('ANA_SENHA')
          data_busca = date.today().isoformat()

          print('ANA_IDENTIFICADOR configurado:', bool(identificador))
          print('ANA_SENHA configurado:', bool(senha))
          print('Base URL:', base_url)
          print('Estação:', station_id)
          print('Data de busca BRT:', data_busca)

          if not identificador or not senha:
              raise SystemExit('Secrets ANA_IDENTIFICADOR e/ou ANA_SENHA não configurados.')

          auth_url = f'{base_url}/OAUth/v1'
          auth = requests.get(auth_url, headers={'Identificador': identificador, 'Senha': senha}, timeout=60)
          print('Auth HTTP status:', auth.status_code)
          print('Auth response prefix:', auth.text[:300])
          auth.raise_for_status()

          auth_payload = auth.json()
          token = (auth_payload.get('items') or {}).get('tokenautenticacao')
          print('Token recebido:', bool(token))
          if not token:
              raise SystemExit('Autenticação respondeu sem tokenautenticacao.')

          data_url = f'{base_url}/HidroinfoanaSerieTelemetricaAdotada/v1'
          params = {
              'CodigoDaEstacao': station_id,
              'TipoFiltroData': 'DATA_LEITURA',
              'DataDeBusca': data_busca,
              'RangeIntervaloDeBusca': 'DIAS_30',
          }
          data = requests.get(data_url, params=params, headers={'Authorization': f'Bearer {token}'}, timeout=90)
          print('Data HTTP status:', data.status_code)
          print('Data final URL:', data.url)
          print('Data response prefix:', data.text[:500])
          data.raise_for_status()

          payload = data.json()
          items = payload if isinstance(payload, list) else payload.get('items') or []
          print('Payload status:', payload.get('status') if isinstance(payload, dict) else 'list')
          print('Payload code:', payload.get('code') if isinstance(payload, dict) else 'list')
          print('Payload message:', payload.get('message') if isinstance(payload, dict) else 'list')
          print('Items retornados:', len(items))
          if items:
              print('Campos do primeiro item:', sorted(items[0].keys()))
          else:
              raise SystemExit('API respondeu sem items para a estação/período.')
          PY

      - name: Coletar dados da estação BARCELOS
        env:
          ANA_API_BASE_URL: "https://www.ana.gov.br/hidrowebservice/EstacoesTelemetricas"
          ANA_API_TOKEN: ${{ secrets.ANA_API_TOKEN }}
          ANA_IDENTIFICADOR: ${{ secrets.ANA_IDENTIFICADOR }}
          ANA_SENHA: ${{ secrets.ANA_SENHA }}
          ANA_STATION_ID: "14480002"
          ANA_STATION_LABEL: "5 - 14480002 - BARCELOS"
        run: python scripts/update_barcelos_data.py

      - name: Validar atualização recente
        run: |
          python - <<'PY'
          import json
          from datetime import date, datetime, timedelta

          with open('data/barcelos-atual.json', encoding='utf-8') as f:
              payload = json.load(f)

          latest = payload.get('latest') or {}
          latest_date_text = latest.get('date')
          status = payload.get('status')
          generated_at = payload.get('generated_at')

          print(f"Status do JSON: {status}")
          print(f"Gerado em: {generated_at}")
          print(f"Última data da base: {latest_date_text}")

          if not latest_date_text:
              raise SystemExit('barcelos-atual.json não possui latest.date')

          latest_date = datetime.strptime(latest_date_text, '%Y-%m-%d').date()
          min_expected = date.today() - timedelta(days=7)

          if latest_date < min_expected:
              raise SystemExit(
                  f'Dados desatualizados: última data {latest_date} é anterior ao mínimo esperado {min_expected}. '
                  'Verifique credenciais, permissões ou parâmetros da API ANA.'
              )

          print('Validação OK: dados recentes encontrados.')
          PY

      - name: Commit dos dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza dados automáticos de Barcelos"
          file_pattern: data/barcelos-nivel.json data/barcelos-atual.json data/barcelos-diario.json data/barcelos-semanal.json
