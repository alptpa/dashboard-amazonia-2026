name: Atualizar dados Barcelos

on:
  workflow_dispatch:
  schedule:
    # A cada 8 horas, em UTC. No Brasil fica aproximadamente 21h, 05h e 13h.
    - cron: "0 */8 * * *"

permissions:
  contents: write

jobs:
  update-barcelos-data:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip --retries 5 --timeout 60
          pip install -r requirements.txt --retries 5 --timeout 60

      - name: Coletar dados da estação BARCELOS
        continue-on-error: true
        timeout-minutes: 20
        env:
          ANA_API_BASE_URL: "https://www.ana.gov.br/hidrowebservice/EstacoesTelemetricas"
          ANA_API_TOKEN: ${{ secrets.ANA_API_TOKEN }}
          ANA_IDENTIFICADOR: ${{ secrets.ANA_IDENTIFICADOR }}
          ANA_SENHA: ${{ secrets.ANA_SENHA }}
          ANA_STATION_ID: "14480002"
          ANA_STATION_LABEL: "5 - 14480002 - BARCELOS"
        run: |
          set +e
          echo "Tentando atualizar dados pela API ANA..."
          success=0
          exit_code=0

          for attempt in 1 2 3 4; do
            echo "Coleta ANA tentativa ${attempt}/4"
            python scripts/update_barcelos_data_v2.py
            exit_code=$?

            if [ "$exit_code" -eq 0 ]; then
              echo "Coleta ANA concluída com sucesso na tentativa ${attempt}."
              success=1
              break
            fi

            echo "Coleta falhou na tentativa ${attempt} com exit code ${exit_code}."

            if [ "$attempt" -lt 4 ]; then
              echo "Aguardando 180 segundos antes de tentar novamente..."
              sleep 180
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "Aviso: coleta ANA falhou após 4 tentativas. Mantendo os JSONs existentes e seguindo o workflow."
          fi

          # Importante: este step não deve derrubar o workflow, pois o dashboard pode usar a última base válida.
          exit 0

      - name: Integrar dashboard aos JSONs
        run: python scripts/patch_index_dynamic_data.py

      - name: Aplicar badge visual no status
        run: python scripts/patch_status_badge.py || true

      - name: Corrigir card de 7 dias
        run: python scripts/patch_7days_summary_safe.py

      - name: Aplicar previsão setembro e rodapé ANA
        run: python scripts/patch_forecast_card_and_api_footer.py

      - name: Validar base existente
        run: |
          python - <<'PY'
          import json
          from datetime import date, datetime, timedelta

          with open('data/barcelos-atual.json', encoding='utf-8') as f:
              payload = json.load(f)

          latest = payload.get('latest') or {}
          latest_date_text = latest.get('date')
          status = payload.get('status')
          generated_at = payload.get('generated_at')

          print(f"Status do JSON: {status}")
          print(f"Gerado em: {generated_at}")
          print(f"Última data da base: {latest_date_text}")

          if not latest_date_text:
              raise SystemExit('barcelos-atual.json não possui latest.date')

          latest_date = datetime.strptime(latest_date_text, '%Y-%m-%d').date()
          min_expected = date.today() - timedelta(days=15)

          if latest_date < min_expected:
              print(
                  f'Aviso: dados antigos. Última data {latest_date} é anterior a {min_expected}. '
                  'O dashboard será mantido com a última base disponível.'
              )
          else:
              print('Validação OK: há dados recentes ou aceitáveis na base existente.')
          PY

      - name: Commit dos dados atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza dados automáticos de Barcelos"
          file_pattern: index.html scripts/update_barcelos_data_v2.py scripts/patch_index_dynamic_data.py scripts/patch_forecast_card_and_api_footer.py data/barcelos-nivel.json data/barcelos-atual.json data/barcelos-diario.json data/barcelos-semanal.json
